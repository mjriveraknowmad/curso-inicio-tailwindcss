<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>
    <link href="../output.css" rel="stylesheet">
</head>
<body class="bg-pink-500 flex flex-col justify-center items-center h-screen">
     
     <div class="w-full h-full flex flex-col justify-center items-center">
          <div>Grid con 4 columnas y sin indicar filas (grid grid-cols-4)</div>
          <div class="w-6/12 h-4/6 bg-pink-300 p-5 grid grid-cols-4 gap-10">
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
          </div>
     </div>

     <div class="w-full h-full flex flex-col justify-center items-center">
          <div>Grid con 4 columnas y 3 filas (grid grid-cols-4 grid-rows-3)</div>
          <div class="w-6/12 h-4/6 bg-pink-300 p-5 grid grid-cols-4 grid-rows-3 gap-10">
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
          </div>
     </div>

     <div class="w-full h-full flex flex-col justify-center items-center">
          <div>Lo mismo que el anterior pero con grid-rows-2, lo que hace que oculte la ultima fila</div>
          <div class="w-6/12 h-4/6 bg-pink-300 p-5 grid grid-cols-4 grid-rows-2 gap-10">
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
               <div class="bg-white rounded-lg"></div>
          </div>
     </div>



</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .elemento{
            background-image: url('img/bg2.jpg');
            background-position: center center;
            background-size: cover;
        }

        .elemento div{
            display: flex; 
            justify-content: center; 
            align-items: center;
        }



    </style>

</head>

<body>

    <div class="container mx-auto py-10">
        <div class="w-4/12 h-96 mx-auto border-2 elemento"></div>
        
        <hr class="my-10">
        
        <h1 class="text-center text-4xl mb-2">Filtros</h1>
        
        <div class="w-4/12 h-96 mx-auto elemento blur"></div>
        
        <div class="w-4/12 h-96 mx-auto elemento brightness-150"></div>
        
        <div class="w-4/12 h-96 mx-auto elemento contrast-200"></div>
        
        <div class="w-4/12 h-96 mx-auto elemento grayscale"></div>
        
        <div class="w-4/12 h-96 mx-auto elemento hue-rotate-90"></div>
        
        <div class="w-4/12 h-96 mx-auto elemento invert"></div>
        
        <div class="w-4/12 h-96 mx-auto elemento saturate-200"></div>
        
        <div class="w-4/12 h-96 mx-auto elemento sepia"></div>
        
        
        
        <hr class="my-20">
        
        
        
        <!-- Backdrop -->
        <h1 class="text-center text-4xl mb-2">Backdrop</h1>
        <div class="w-4/12 h-96 mx-auto elemento">
            <div class="w-full h-full backdrop-blur">
                <p class="bg-white p-5 rounded">Hola Tailwind</p>
            </div>
        </div>
        
        <div class="w-4/12 h-96 mx-auto elemento">
            <div class="w-full h-full backdrop-brightness-200">
                <p class="bg-white p-5 rounded">Hola Tailwind</p>
            </div>
        </div>
        
        <div class="w-4/12 h-96 mx-auto elemento">
            <div class="w-full h-full backdrop-contrast-200">
                <p class="bg-white p-5 rounded">Hola Tailwind</p>
            </div>
        </div>
        
        <div class="w-4/12 h-96 mx-auto elemento">
            <div class="w-full h-full backdrop-grayscale">
                <p class="bg-white p-5 rounded">Hola Tailwind</p>
            </div>
        </div>
        
        
        <div class="w-4/12 h-96 mx-auto elemento">
            <div class="w-full h-full backdrop-hue-rotate-90">
                <p class="bg-white p-5 rounded">Hola Tailwind</p>
            </div>
        </div>
        
        
        <div class="w-4/12 h-96 mx-auto elemento">
            <div class="w-full h-full backdrop-invert">
                <p class="bg-white p-5 rounded">Hola Tailwind</p>
            </div>
        </div>
        
        
        <div class="w-4/12 h-96 mx-auto elemento">
            <div class="w-full h-full backdrop-saturate-200">
                <p class="bg-white p-5 rounded">Hola Tailwind</p>
            </div>
        </div>
        
        <div class="w-4/12 h-96 mx-auto elemento">
            <div class="w-full h-full backdrop-sepia">
                <p class="bg-white p-5 rounded">Hola Tailwind</p>
            </div>
        </div>
        <hr class="my-20">

        <!-- Drop Shadow -->
        <h1 class="text-center text-4xl mb-10">Drop Shadow</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 px-4">
            <!-- Drop Shadow Básico -->
            
                <p class="text-sm font-semibold">drop-shadow-md</p>
                <div class="flex justify-center items-center">
                    <svg class="drop-shadow-md w-20 h-20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="40" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
                        <text x="50" y="55" text-anchor="middle" font-size="20" fill="white" font-weight="bold">
                            Drop
                        </text>
                    </svg>
                </div>

            <!-- Drop Shadow Lg -->
            
                <p class="text-sm font-semibold">drop-shadow-lg</p>
                <div class="flex justify-center items-center">
                    <svg class="drop-shadow-lg w-20 h-20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="20" y="20" width="60" height="60" fill="#10b981" stroke="#059669" stroke-width="2" rx="8"/>
                        <text x="50" y="55" text-anchor="middle" font-size="20" fill="white" font-weight="bold">
                            LG
                        </text>
                    </svg>
                </div>

            <!-- Drop Shadow XL -->
            
                <p class="text-sm font-semibold">drop-shadow-xl</p>
                <div class="flex justify-center items-center">
                    <svg class="drop-shadow-xl w-20 h-20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 50 20 L 61 45 L 87 45 L 67 65 L 78 90 L 50 70 L 22 90 L 33 65 L 13 45 L 39 45 Z" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
                    </svg>
                </div>
        </div>

        <!-- Drop Shadow con Colores -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 px-4 mt-8">
            <!-- Cyan -->
            
                <p class="text-sm font-semibold">drop-shadow-cyan-500/50</p>
                <div class="flex justify-center items-center">
                    <svg class="drop-shadow-xl drop-shadow-cyan-500/50 w-20 h-20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="40" fill="#06b6d4"/>
                    </svg>
                </div>

            <!-- Blue -->
            
                <p class="text-sm font-semibold">drop-shadow-blue-500/50</p>
                <div class="flex justify-center items-center">
                    <svg class="drop-shadow-xl drop-shadow-blue-500/50 w-20 h-20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="20" y="20" width="60" height="60" fill="#3b82f6" rx="8"/>
                    </svg>
                </div>

            <!-- Purple -->
            
                <p class="text-sm font-semibold">drop-shadow-purple-500/50</p>
                <div class="flex justify-center items-center">
                    <svg class="drop-shadow-xl drop-shadow-purple-500/50 w-20 h-20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 50 20 L 61 45 L 87 45 L 67 65 L 78 90 L 50 70 L 22 90 L 33 65 L 13 45 L 39 45 Z" fill="#a855f7"/>
                    </svg>
                </div>
        </div>

        <hr class="my-20">

    </div>

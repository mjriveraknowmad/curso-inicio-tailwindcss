<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="../output.css" rel="stylesheet">
    <style>
        #dividerx div {
            display: inline-block;
        }

        #dividery div {
            display: block;
        }
    </style>
</head>

<body>

    <div class="container mx-auto py-10">
        <p class="text-right mb-10">Más info: <a href="https://tailwindcss.com/docs/border-width#between-children" class="text-blue-500 underline">Divider (dentro de sección border)</a></p>
        <!-- Divider -->
        <h1 class="text-4xl mb-5">Divider X</h1>
        <div id="dividerx" class="divide-x-4 divide-green-500/50 divide-dashed">
            <div class="w-40 h-auto p-5 text-5xl text-center text-green-500">1</div>
            <div class="w-40 h-auto p-5 text-5xl text-center text-green-500">2</div>
            <div class="w-40 h-auto p-5 text-5xl text-center text-green-500">3</div>
            <div class="w-40 h-auto p-5 text-5xl text-center text-green-500">4</div>
        </div>

        
        <hr class="my-10">


        <h1 class="text-4xl mb-5">Divider Y</h1>
        <div id="dividery" class="divide-y divide-yellow-500">
            <div class="w-40 h-auto p-5 text-5xl text-center text-yellow-500">1</div>
            <div class="w-40 h-auto p-5 text-5xl text-center text-yellow-500">2</div>
            <div class="w-40 h-auto p-5 text-5xl text-center text-yellow-500">3</div>
            <div class="w-40 h-auto p-5 text-5xl text-center text-yellow-500">4</div>
        </div>

        <hr class="my-10">

        <h1 class="text-4xl mb-5">Divider con grid</h1>
        <div class="grid grid-cols-3 divide-indigo-500  divide-x-3 divide-dashed text-center text-sm">
            <div>01</div>
            <div>02</div>
            <div>03</div>
        </div>

    </div>

</body>

</html>
